<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Lab-InterReviewer - 导师端</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="command-center">
        <!-- 顶部导航栏 -->
        <header class="command-bar">
            <div class="command-bar-left">
                <div class="brand">
                    <div class="brand-icon">
                        <i class="fas fa-chalkboard-teacher"></i>
                    </div>
                    <div class="brand-text">
                        <h1>AI Lab-InterReviewer</h1>
                        <span class="brand-sub">导师管理端</span>
                    </div>
                </div>
            </div>
            <div class="command-bar-right">
                <button class="icon-btn" id="refresh-rooms-btn" title="刷新房间列表">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <a href="/static/index.html" class="icon-btn" title="学生端">
                    <i class="fas fa-user-graduate"></i>
                </a>
            </div>
        </header>

        <!-- 主体区域 -->
        <div class="command-body" style="display: flex; flex-direction: column; padding: 20px; overflow-y: auto;">

            <!-- 创建房间区域 -->
            <div class="panel-section" style="background: rgba(26, 32, 44, 0.6); padding: 24px; border-radius: 12px; margin-bottom: 24px;">
                <div class="panel-section-title" style="font-size: 18px; margin-bottom: 20px;">
                    <i class="fas fa-plus-circle"></i> 创建测试房间
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
                    <div>
                        <label class="field-label">导师姓名</label>
                        <input type="text" id="teacher-name" placeholder="例如：李老师" class="cyber-input">
                    </div>
                    <div>
                        <label class="field-label">导师风格</label>
                        <select id="prompt-choice" class="cyber-select">
                            <option value="温和型导师">温和型导师</option>
                            <option value="正常型导师（默认）" selected>正常型导师</option>
                            <option value="压力型导师">压力型导师</option>
                        </select>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px;">
                    <label class="cyber-toggle">
                        <input type="checkbox" id="enable-tts" checked>
                        <span class="toggle-slider"></span>
                        <span class="toggle-text">TTS 语音播报</span>
                    </label>
                    <label class="cyber-toggle">
                        <input type="checkbox" id="auto-vad" checked>
                        <span class="toggle-slider"></span>
                        <span class="toggle-text">自动录音监听</span>
                    </label>
                    <label class="cyber-toggle">
                        <input type="checkbox" id="enable-video">
                        <span class="toggle-slider"></span>
                        <span class="toggle-text">视频录制</span>
                    </label>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;">
                    <label class="cyber-toggle">
                        <input type="checkbox" id="enable-rag" checked>
                        <span class="toggle-slider"></span>
                        <span class="toggle-text">知识库检索</span>
                    </label>
                    <label class="cyber-toggle">
                        <input type="checkbox" id="require-resume">
                        <span class="toggle-slider"></span>
                        <span class="toggle-text">要求学生提交简历</span>
                    </label>
                </div>

                <button class="cyber-btn cyber-btn-accent full-width" id="create-room-btn" style="margin-top: 12px;">
                    <i class="fas fa-rocket"></i> 创建房间
                </button>
            </div>

            <!-- 导师文档管理区域 -->
            <div class="panel-section" style="background: rgba(26, 32, 44, 0.6); padding: 24px; border-radius: 12px; margin-bottom: 24px;">
                <div class="panel-section-title" style="font-size: 18px; margin-bottom: 20px;">
                    <i class="fas fa-file-pdf"></i> 导师资料管理
                </div>
                <p class="hint-text" style="margin-bottom: 12px;">上传导师相关的教学资料、研究文档等 PDF 文件，将自动索引到知识库供面试时检索使用</p>

                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px;">
                    <input type="text" id="doc-advisor-school" placeholder="导师所在大学（选填）" class="cyber-input">
                    <input type="text" id="doc-advisor-lab" placeholder="实验室名称（选填）" class="cyber-input">
                    <input type="text" id="doc-advisor-name" placeholder="导师姓名（选填）" class="cyber-input">
                </div>

                <input type="file" id="advisor-doc-input" accept=".pdf" style="display: none;">
                <button class="cyber-btn cyber-btn-accent full-width" id="advisor-doc-upload-btn">
                    <i class="fas fa-cloud-upload-alt"></i> 上传 PDF 文档
                </button>

                <div id="advisor-doc-progress" style="display:none; margin-top:12px;">
                    <div class="progress-track" style="height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;">
                        <div id="advisor-doc-progress-fill" style="height: 100%; background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); width: 0%; transition: width 0.3s;"></div>
                    </div>
                    <p class="hint-text" id="advisor-doc-progress-text" style="margin-top: 6px;">正在上传...</p>
                </div>

                <div id="advisor-docs-list" style="margin-top: 12px;">
                    <p class="hint-text">暂无文档</p>
                </div>
            </div>

            <!-- 房间列表区域 -->
            <div class="panel-section" style="background: rgba(26, 32, 44, 0.6); padding: 24px; border-radius: 12px;">
                <div class="panel-section-title" style="font-size: 18px; margin-bottom: 20px;">
                    <i class="fas fa-list"></i> 测试房间列表
                </div>
                <div id="rooms-container">
                    <p class="hint-text">暂无房间，点击上方创建第一个测试房间</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 加载覆盖层 -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-orb">
            <div class="spinner-ring"></div>
            <div class="spinner-ring spinner-ring-2"></div>
        </div>
        <p id="loading-text">正在处理...</p>
    </div>

    <script src="/static/js/teacher.js"></script>
</body>
</html>
